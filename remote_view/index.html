<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista Remota - Camara</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #0d0d0d;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        video {
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            background: #1a1a1a;
        }
        #status {
            margin: 20px 0;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
        }
        .connecting { background: #fbbf24; color: black; }
        .connected { background: #22c55e; color: white; }
        .error { background: #ef4444; color: white; }
        h1 { margin-bottom: 20px; font-size: 1.5rem; }
    </style>
</head>
<body>
    <h1>Transmitiendo camara...</h1>
    <video id="video" autoplay playsinline muted></video>
    <div id="status" class="connecting">Esperando permisos...</div>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const wsUrl = `${protocol}://${window.location.host}/ws`;
        const peers = new Map();
        let ws;
        let localStream;

        function setStatus(message, className) {
            status.textContent = message;
            status.className = className;
        }

        async function createPeer(viewerId) {
            if (peers.has(viewerId)) {
                return peers.get(viewerId);
            }

            const pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });

            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            pc.onicecandidate = event => {
                if (event.candidate && ws?.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'ice-candidate',
                        candidate: event.candidate,
                        target: viewerId
                    }));
                }
            };

            pc.onconnectionstatechange = () => {
                if (pc.connectionState === 'connected') {
                    setStatus('Transmitiendo camara', 'connected');
                }

                if (['failed', 'closed', 'disconnected'].includes(pc.connectionState)) {
                    peers.delete(viewerId);
                }
            };

            peers.set(viewerId, pc);
            return pc;
        }

        async function startCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: true
                });
                video.srcObject = localStream;
                setStatus('Camara conectada, esperando visor...', 'connected');
                connectWebSocket();
            } catch (err) {
                setStatus('Error: ' + err.message, 'error');
                console.error(err);
            }
        }

        function connectWebSocket() {
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                ws.send(JSON.stringify({ role: 'broadcaster' }));
                setStatus('Conectado al servidor', 'connected');
            };

            ws.onmessage = async (event) => {
                const data = JSON.parse(event.data);

                if (data.type === 'viewer-ready') {
                    setStatus('Visor conectado, esperando negociacion...', 'connected');
                    return;
                }

                if (data.type === 'offer' && data.from) {
                    const pc = await createPeer(data.from);
                    await pc.setRemoteDescription(data.sdp);
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    ws.send(JSON.stringify({
                        type: 'answer',
                        sdp: answer,
                        target: data.from
                    }));
                    return;
                }

                if (data.type === 'ice-candidate' && data.from) {
                    const pc = await createPeer(data.from);
                    await pc.addIceCandidate(data.candidate);
                    return;
                }

                if (data.type === 'viewer-left' && data.viewer_id) {
                    peers.get(data.viewer_id)?.close();
                    peers.delete(data.viewer_id);
                    if (peers.size === 0) {
                        setStatus('Esperando un visor...', 'connecting');
                    }
                    return;
                }

                if (data.type === 'error') {
                    setStatus(data.message || 'Error del servidor', 'error');
                }
            };

            ws.onerror = () => {
                setStatus('Error de conexion', 'error');
            };

            ws.onclose = () => {
                setStatus('Servidor desconectado', 'error');
            };
        }

        startCamera();
    </script>
</body>
</html>

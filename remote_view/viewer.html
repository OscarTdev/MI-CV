<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Camara Remota</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #0d0d0d;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        video {
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            background: #1a1a1a;
        }
        #status {
            margin: 20px 0;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
        }
        .waiting { background: #3b82f6; color: white; }
        .connected { background: #22c55e; color: white; }
        .error { background: #ef4444; color: white; }
        h1 { margin-bottom: 20px; font-size: 1.5rem; }
    </style>
</head>
<body>
    <h1>Ver camara remota</h1>
    <video id="video" autoplay playsinline></video>
    <div id="status" class="waiting">Conectando...</div>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const wsUrl = `${protocol}://${window.location.host}/ws`;
        let ws;
        let pc;
        let remoteStream = new MediaStream();

        function setStatus(message, className) {
            status.textContent = message;
            status.className = className;
        }

        function resetPeer() {
            if (pc) {
                pc.close();
            }

            remoteStream = new MediaStream();
            video.srcObject = remoteStream;
            pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });

            pc.ontrack = event => {
                event.streams[0].getTracks().forEach(track => {
                    remoteStream.addTrack(track);
                });
                video.srcObject = remoteStream;
                setStatus('Recibiendo camara', 'connected');
            };

            pc.onicecandidate = event => {
                if (event.candidate && ws?.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'ice-candidate',
                        candidate: event.candidate
                    }));
                }
            };

            pc.onconnectionstatechange = () => {
                if (['failed', 'closed', 'disconnected'].includes(pc.connectionState)) {
                    setStatus('Conexion reiniciando...', 'waiting');
                }
            };
        }

        async function startConnection() {
            resetPeer();
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            ws.send(JSON.stringify({ type: 'offer', sdp: offer }));
        }

        async function connectWebSocket() {
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                ws.send(JSON.stringify({ role: 'viewer' }));
                setStatus('Conectado, esperando camara...', 'waiting');
            };

            ws.onmessage = async (event) => {
                const data = JSON.parse(event.data);

                if (data.type === 'waiting-broadcaster') {
                    setStatus('Esperando a que la camara se conecte...', 'waiting');
                    return;
                }

                if (data.type === 'broadcaster-ready') {
                    setStatus('Camara detectada, iniciando conexion...', 'waiting');
                    await startConnection();
                    return;
                }

                if (data.type === 'answer') {
                    await pc.setRemoteDescription(data.sdp);
                    return;
                }

                if (data.type === 'ice-candidate') {
                    await pc.addIceCandidate(data.candidate);
                    return;
                }

                if (data.type === 'error') {
                    setStatus(data.message || 'Error del servidor', 'error');
                }
            };

            ws.onerror = () => {
                setStatus('Error de conexion', 'error');
            };

            ws.onclose = () => {
                setStatus('Servidor desconectado', 'error');
            };
        }

        connectWebSocket();
    </script>
</body>
</html>
